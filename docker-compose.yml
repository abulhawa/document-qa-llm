services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.32.0
    restart: unless-stopped
    ports:
      - 8080:8080
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 20
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
      VECTOR_INDEX_TYPE: 'hnsw'
  # qdrant-db:
  #   image: qdrant/qdrant
  #   container_name: qdrant-db
  #   ports:
  #     - "6333:6333"
  #   volumes:
  #     - qdrant_data:/qdrant/storage

  embedder-api-service:
    build:
      context: ./embedder_api_multilingual
    container_name: embedder-api-service
    ports:
      - "8000:8000"
    env_file: ./embedder_api_multilingual/.env
    volumes:
      - hf_cache:/root/.cache/huggingface

  phoenix-server:
    image: arizephoenix/phoenix:latest
    container_name: phoenix-server
    ports:
      - "6006:6006"
      - "4317:4317"
    volumes:
      - phoenix_data:/phoenix-server/data
    environment:
      - PHOENIX_SERVER_PORT=6006

volumes:
  weaviate_data:
  phoenix_data:
  hf_cache:
  # qdrant_data:
